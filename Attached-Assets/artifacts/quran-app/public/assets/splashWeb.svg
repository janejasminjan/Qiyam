<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1a5c3a"/>
      <stop offset="100%" stop-color="#0a2e1c"/>
    </radialGradient>
    <mask id="cm">
      <circle cx="-20" cy="-5" r="82" fill="white"/>
      <circle cx="30" cy="-24" r="70" fill="black"/>
    </mask>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>

  <g transform="translate(640,360)">
    <!-- Decorative rings -->
    <circle r="118" fill="none" stroke="#d4a81a" stroke-width="0.8" opacity="0.18"/>
    <circle r="104" fill="none" stroke="#d4a81a" stroke-width="0.5" opacity="0.1"/>
    <!-- 16 radial tick marks -->
    <g stroke="#d4a81a" stroke-width="1.2" opacity="0.13">
      <line x1="0" y1="-122" x2="0" y2="-138"/>
      <line x1="0" y1="-122" x2="0" y2="-138" transform="rotate(22.5)"/>
      <line x1="0" y1="-122" x2="0" y2="-138" transform="rotate(45)"/>
      <line x1="0" y1="-122" x2="0" y2="-138" transform="rotate(67.5)"/>
      <line x1="0" y1="-122" x2="0" y2="-138" transform="rotate(90)"/>
      <line x1="0" y1="-122" x2="0" y2="-138" transform="rotate(112.5)"/>
      <line x1="0" y1="-122" x2="0" y2="-138" transform="rotate(135)"/>
      <line x1="0" y1="-122" x2="0" y2="-138" transform="rotate(157.5)"/>
      <line x1="0" y1="-122" x2="0" y2="-138" transform="rotate(180)"/>
      <line x1="0" y1="-122" x2="0" y2="-138" transform="rotate(202.5)"/>
      <line x1="0" y1="-122" x2="0" y2="-138" transform="rotate(225)"/>
      <line x1="0" y1="-122" x2="0" y2="-138" transform="rotate(247.5)"/>
      <line x1="0" y1="-122" x2="0" y2="-138" transform="rotate(270)"/>
      <line x1="0" y1="-122" x2="0" y2="-138" transform="rotate(292.5)"/>
      <line x1="0" y1="-122" x2="0" y2="-138" transform="rotate(315)"/>
      <line x1="0" y1="-122" x2="0" y2="-138" transform="rotate(337.5)"/>
    </g>

    <!-- Crescent moon -->
    <circle cx="-20" cy="-5" r="82" fill="#d4a81a" mask="url(#cm)"/>

    <!-- Minaret tower -->
    <g transform="translate(10,8)">
      <rect x="-12" y="34" width="24" height="7" rx="1.5" fill="#d4a81a"/>
      <rect x="-8" y="-56" width="16" height="90" fill="#d4a81a"/>
      <rect x="-11" y="-59" width="22" height="4" rx="1" fill="#d4a81a"/>
      <rect x="-5.5" y="-82" width="11" height="23" fill="#d4a81a"/>
      <rect x="-9" y="-85" width="18" height="4" rx="1" fill="#d4a81a"/>
      <rect x="-3.5" y="-105" width="7" height="20" fill="#d4a81a"/>
      <rect x="-7" y="-107" width="14" height="3" rx="1" fill="#d4a81a"/>
      <ellipse cx="0" cy="-112" rx="9" ry="7" fill="#d4a81a"/>
      <line x1="0" y1="-119" x2="0" y2="-133" stroke="#d4a81a" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Dark arch entrance and windows -->
      <path d="M-4,41 L-4,14 Q0,3 4,14 L4,41 Z" fill="#061810"/>
      <rect x="-2.5" y="-38" width="5" height="7" rx="2.5" fill="#061810"/>
      <rect x="-2.5" y="-15" width="5" height="7" rx="2.5" fill="#061810"/>
    </g>

    <!-- 5-pointed star -->
    <g transform="translate(68,-62)">
      <path d="M0,-14 L3.29,-4.52 L13.32,-4.33 L5.33,1.73 L8.23,11.33 L0,5.6 L-8.23,11.33 L-5.33,1.73 L-13.32,-4.33 L-3.29,-4.52 Z" fill="#d4a81a"/>
    </g>

    <!-- Arabic text -->
    <text x="0" y="100" font-family="'Amiri','Noto Naskh Arabic','Times New Roman',serif" font-size="62" text-anchor="middle" fill="#d4a81a">قيام</text>
    <!-- Separator -->
    <line x1="-90" y1="120" x2="90" y2="120" stroke="#d4a81a" stroke-width="0.8" opacity="0.5"/>
    <!-- Latin title -->
    <text x="0" y="148" font-family="'Cinzel','Cormorant Garamond','Palatino Linotype','Georgia',serif" font-size="26" text-anchor="middle" fill="#d4a81a" letter-spacing="14">QIYAM</text>
    <!-- Tagline -->
    <text x="0" y="172" font-family="'Cinzel','Georgia',serif" font-size="11.5" text-anchor="middle" fill="#d4a81a" opacity="0.55" letter-spacing="2.5">Night Prayer · Remembrance · Devotion</text>
  </g>
</svg>
