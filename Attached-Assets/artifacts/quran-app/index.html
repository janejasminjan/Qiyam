<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Qiyam – Night Prayer</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme / status bar -->
    <meta name="theme-color" content="#0a2e1c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Qiyam" />

    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" href="/assets/icon-512.svg" />

    <!-- Apple splash screens -->
    <link rel="apple-touch-startup-image" href="/assets/splashIOS.svg" />

    <!-- Open Graph -->
    <meta property="og:title" content="Qiyam – Night Prayer" />
    <meta property="og:description" content="Your companion for Qiyam al-Layl — night prayer, dhikr, and devotion." />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:type" content="website" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

    <!-- Splash overlay styles -->
    <style>
      #qiyam-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #0a2e1c;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.6s ease;
      }
      #qiyam-splash img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      #qiyam-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- Splash screen (hidden after 2.5s) -->
    <div id="qiyam-splash">
      <img id="qiyam-splash-img" src="/assets/splashWeb.svg" alt="Qiyam" />
    </div>

    <div id="root"></div>

    <!-- Platform-aware splash + auto-hide -->
    <script>
      (function () {
        var ua = navigator.userAgent;
        var platform = /android/i.test(ua) ? 'android'
          : (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) ? 'ios'
          : window.matchMedia('(display-mode: standalone)').matches ? 'pwa'
          : 'web';
        var src = {
          android: '/assets/splashAndroid.svg',
          ios: '/assets/splashIOS.svg',
          pwa: '/assets/splashWeb.svg',
          web: '/assets/splashWeb.svg'
        }[platform];
        document.getElementById('qiyam-splash-img').src = src;
        setTimeout(function () {
          var el = document.getElementById('qiyam-splash');
          if (el) {
            el.classList.add('hidden');
            setTimeout(function () { el.remove(); }, 650);
          }
        }, 2500);
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
